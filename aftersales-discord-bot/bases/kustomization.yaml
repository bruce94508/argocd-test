apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deploy.yaml

configMapGenerator:
  - name: aftersales-discord-bot-cm
    envs:
      - .env.example

# secretGenerator:
#   - name: aftersales-discord-bot-secret
#     envs:
#       - secret.env.example

generatorOptions:
  disableNameSuffixHash: true

labels:
  - pairs:
      app.maxwin/name: aftersales-discord-bot
      app.maxwin/component: backend
    includeSelectors: true
    includeTemplates: true
