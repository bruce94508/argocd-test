apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: apts-racev

resources:
  - ../bases

configMapGenerator:
  - name: aftersales-discord-bot-cm
    behavior: merge
    envs:
      - .env

images:
  - name: cicd-so-happy.maxwin.com.tw:5000/aftersales-discord-bot
    newTag: 1.1.0

labels:
  - pairs:
      app.maxwin/name: aftersales-discord-bot
      app.maxwin/component: backend
    includeSelectors: true
    includeTemplates: true

patches:
  - path: patch-deploy.yaml
