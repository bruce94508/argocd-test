  pullPolicy: IfNotPresent
  tag: 1.0.2

resources: {}

labels:
  app.maxwin/component: backend
  app.maxwin/name: qisda-vehicle-data-porter

# 全域ConfigMap配置
config:
  DB_SERVER: test
  DB_PORT: "test"
  DB_DATABASE: test
  DRY_RUN: "false"
