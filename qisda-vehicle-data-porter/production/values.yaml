# 全域Secret配置
secret:
  DB_USER: test
  DB_PASSWORD: test
  MONGO_URI: mongodb://SaturnDB:QisdaBenQ@192.168.186.147/saturn?authMechanism=SCRAM-SHA-1

targets:
