---
kind: ReferenceGrant
apiVersion: gateway.networking.k8s.io/v1beta1
metadata:
  name: vehicle-model-api-grant
  namespace: apts-racev
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: apts-racev
  to:
    - group: ""
      kind: Service
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vehicle-model-api
  namespace: apts-racev
  annotations:
    konghq.com/strip-path: "true"
spec:
  parentRefs:
    - name: kong
      namespace: kong
  hostnames:
    - 10.40.1.105
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /vehicle-model-api
      backendRefs:
        - name: vehicle-model-api-svc
          kind: Service
          port: 5000
          namespace: apts-racev
