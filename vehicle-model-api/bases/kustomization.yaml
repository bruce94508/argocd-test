apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deploy.yaml
  - svc.yaml

configMapGenerator:
  - name: vehicle-model-api-cm
    envs:
      - .env.example

secretGenerator:
  - name: vehicle-model-api-secret
    envs:
      - "secret.env.example"

generatorOptions:
  disableNameSuffixHash: true

labels:
  - pairs:
      app.maxwin/name: vehicle-model-api
      app.maxwin/component: backend
    includeSelectors: true
    includeTemplates: true
