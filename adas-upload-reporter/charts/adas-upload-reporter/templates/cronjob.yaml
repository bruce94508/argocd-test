{{- range .Values.targets }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ $.Release.Name }}-{{ .name | kebabcase }}
  namespace: {{ $.Release.Namespace }}
  {{- with $.Values.labels }}
  labels:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  timeZone: {{ .timeZone | default "Asia/Taipei" }}
  schedule: {{ .schedule | quote }}
  startingDeadlineSeconds: {{ .startingDeadlineSeconds | default 600 }}
  concurrencyPolicy: {{ .concurrencyPolicy | default "Replace" }}
  jobTemplate:
    spec:
      template:
        metadata:
          {{- with $.Values.labels }}
          labels:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        spec:
          containers:
            - name: {{ $.Release.Name }}-{{ .name | kebabcase }}
              image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag }}"
              imagePullPolicy: {{ $.Values.image.pullPolicy }}
              envFrom:
                - secretRef:
                    name: {{ $.Release.Name }}-{{ .name | kebabcase }}-secret
                - configMapRef:
                    name: {{ $.Release.Name }}-{{ .name | kebabcase }}-cm
              {{- with .resources | default $.Values.resources }}
              resources:
                {{- toYaml . | nindent 16 }}
              {{- end }}
              volumeMounts:
                - name: seeds
                  mountPath: /app/seeds
                {{- if $.Values.persistence.enabled }}
                - name: results-volume
                  mountPath: {{ $.Values.persistence.mountPath | default "/app/results" }}
                {{- end }}
          volumes:
            - name: seeds
              configMap:
                name: {{ $.Release.Name }}-seeds-cm
            {{- if $.Values.persistence.enabled }}
            - name: results-volume
              persistentVolumeClaim:
                claimName: {{ $.Release.Name }}-results-pvc
            {{- end }}
          restartPolicy: Never
---
{{- end }}
