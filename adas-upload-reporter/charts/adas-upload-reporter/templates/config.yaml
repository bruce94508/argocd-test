{{- range .Values.targets }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $.Release.Name }}-{{ .name | kebabcase }}-cm
  namespace: {{ $.Release.Namespace }}
  {{- with $.Values.labels }}
  labels:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  {{- $globalConfig := $.Values.config | default dict }}
  {{- $localConfig := .extraConfig | default dict }}
  {{- $mergedConfig := merge (deepCopy $localConfig) $globalConfig }}
  {{- range $key, $value := $mergedConfig }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
---
{{- end }}

apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $.Release.Name }}-seeds-cm
  namespace: {{ $.Release.Namespace }}
  labels:
{{- range $key, $value := $.Values.commonLabels }}
    {{ $key }}: {{ $value | quote }}
{{- end }}
data:
  company.json: |-
{{ (.Files.Get "seeds/company.json") | indent 4 }}

---