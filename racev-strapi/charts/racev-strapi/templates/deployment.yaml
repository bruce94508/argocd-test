apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ $.Release.Namespace }}
  {{- with $.Values.labels }}
  labels:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- with $.Values.labels }}
      {{- toYaml . | nindent 6 }}
      {{- end }}
  template:
    metadata:
      {{- with $.Values.labels }}
      labels:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      annotations:
        # 當 ConfigMap 或 Secret 內容變更時，Hash 會改變，Deployment 會自動重新部署
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      {{- if .Values.persistence.buildCache.enabled }}
      # Init Container: 負責 Hash 比對與 npm run build，完成後 Main Container 才會啟動
      initContainers:
        - name: strapi-builder
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          workingDir: /var/maxwin/racev-strapi
          # 覆蓋 Dockerfile 的 ENTRYPOINT，直接執行掛載進來的 build 腳本
          command: ["/scripts/init-build.sh"]
          envFrom:
            - configMapRef:
                name: {{ $.Release.Name }}-cm
            - secretRef:
                name: {{ $.Release.Name }}-secret
          volumeMounts:
            - name: shared-build
              mountPath: /shared-data
            - name: build-script
              mountPath: /scripts
          {{- with $.Values.initResources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- end }}
      containers:
        - name: strapi
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.persistence.buildCache.enabled }}
          # Main Container 計算 Hash，並把專屬資料夾 symlink 到容器內
          command: ["/bin/sh", "-c"]
          args:
            - |
              CURRENT_ENV="${PUBLIC_URL}_${STRAPI_ADMIN_OIDC_ENABLED}_${STRAPI_ADMIN_OIDC_ISSUER}"
              CURRENT_HASH=$(echo -n "$CURRENT_ENV" | md5sum | awk '{print $1}')
              echo "Linking build cache: build_${CURRENT_HASH}"
              rm -rf /var/maxwin/racev-strapi/build
              ln -s /shared-data/build_${CURRENT_HASH} /var/maxwin/racev-strapi/build
              exec npm start
          {{- end }}
          ports:
            - containerPort: 1337
              name: http
              protocol: TCP
          {{- with $.Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          envFrom:
            - configMapRef:
                name: {{ $.Release.Name }}-cm
            - secretRef:
                name: {{ $.Release.Name }}-secret
          {{- if .Values.probes }}
          {{- if .Values.probes.startup }}
          startupProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: {{ .Values.probes.startup.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
          {{- end }}
          {{- if .Values.probes.liveness }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          {{- end }}
          {{- end }}
          volumeMounts:
            {{- with .Values.configHooks }}
            {{- $hooks := . }}
            {{- range (keys . | sortAlpha) }}
            - name: config-hooks-volume
              mountPath: /var/maxwin/racev-strapi/config/{{ . }}
              subPath: {{ . | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.persistence.uploads.enabled }}
            - name: uploads-volume
              mountPath: /var/maxwin/racev-strapi/public/uploads
            {{- end }}
            {{- if .Values.persistence.buildCache.enabled }}
            # 掛載整個 PVC 到 /shared-data，讓啟動腳本去 symlink 專屬的 Hash 資料夾
            - name: shared-build
              mountPath: /shared-data
            {{- end }}
      volumes:
        - name: config-hooks-volume
          configMap:
            name: {{ .Release.Name }}-config-hooks-cm
        {{- if .Values.persistence.uploads.enabled }}
        - name: uploads-volume
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-uploads-pvc
        {{- else }}
        - name: uploads-volume
          emptyDir: {}
        {{- end }}
        {{- if .Values.persistence.buildCache.enabled }}
        - name: shared-build
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-build-cache-pvc
        - name: build-script
          configMap:
            name: {{ .Release.Name }}-build-script-cm
            defaultMode: 0755
        {{- end }}