replicaCount: 2

image:
  repository: cicd-so-happy.maxwin.com.tw:5000/racev-strapi
  tag: "1.18.1"
  pullPolicy: IfNotPresent

labels:
  app.maxwin/component: backend
  app.maxwin/name: racev-strapi

service:
  type: ClusterIP
  port: 1337

persistence:
  uploads:
    enabled: false
    storageClass: "longhorn"
    size: 5Gi
  buildCache:
    enabled: true
    storageClass: "nfs-rwx"
    size: 1Gi

configHooks:
  api.js: |-
    module.exports = {
      rest: {
        defaultLimit: 300,
        maxLimit: 300,
        withCount: true,
      },
    };

config:
  TZ: Asia/Taipei
  DATABASE_HOST: 10.40.1.105
  DATABASE_PORT: 3307
  PUBLIC_URL: http://localhost:1337
  STRAPI_ADMIN_OIDC_ENABLED: true
  STRAPI_ADMIN_OIDC_ISSUER: RACEV-OIDC
  OIDC_REDIRECT_URI: http://localhost:1337/strapi-plugin-sso/oidc/callback
  OIDC_CLIENT_ID: racev-strapi-admin-oidc
  OIDC_AUTHORIZATION_ENDPOINT: http://10.40.1.105:8089/realms/racev/protocol/openid-connect/auth
  OIDC_TOKEN_ENDPOINT: http://10.40.1.105:8089/realms/racev/protocol/openid-connect/token
  OIDC_USER_INFO_ENDPOINT: http://10.40.1.105:8089/realms/racev/protocol/openid-connect/userinfo

