---
kind: ReferenceGrant
apiVersion: gateway.networking.k8s.io/v1beta1
metadata:
  name: racev-strapi-grant
  namespace: apts-racev
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: apts-racev
  to:
    - group: ""
      kind: Service
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: racev-strapi
  namespace: apts-racev
  annotations:
    konghq.com/strip-path: "true"
spec:
  parentRefs:
    - name: kong
      namespace: kong
  hostnames:
    - 10.40.201.251
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /racev-strapi
      backendRefs:
        - name: racev-strapi-svc
          kind: Service
          port: 1337
          namespace: apts-racev
