apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - "./cronjob.yaml"

configMapGenerator:
  - name: hmi-daily-report-cm
    envs:
      - ".env.example"
secretGenerator:
  - name: hmi-daily-report-secret
    files:
      - "secret.env.example"

generatorOptions:
  disableNameSuffixHash: true

commonLabels:
  app.maxwin/name: hmi-daily-report
  app.maxwin/component: backend
