{{- range .Values.jobs }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $.Release.Name }}-cm-{{ .name }}
  namespace: {{ $.Release.Namespace }}
  labels:
{{- range $key, $value := $.Values.commonLabels }}
    {{ $key }}: {{ $value | quote }}
{{- end }}
data:
  JOB_TYPE: {{ .jobType | quote }}
  # 合併基礎設定與 extraConfig 專屬設定，後者若有同名 key 會覆寫前者
  {{- $merged := merge $.Values.commonConfig (default dict .extraConfig) }}
  {{- range $key, $value := $merged }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
---
{{- end }}
